name: Weekly price update

on:
  workflow_dispatch:
  # VPS cron is the primary Monday trigger; this workflow is a manual fallback.
  # Actions minutes are exhausted until 2026-07-01, and two live triggers would race on main.
  # schedule:
  #   - cron: '17 3 * * 1'

permissions:
  contents: write

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run weekly provider update
        run: npm run prices:update
        env:
          PRICE_LIMIT: '104'

      - name: Build app
        run: npm run build

      - name: Commit updated price snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(data): weekly price snapshot'
          commit_user_name: 'Ricky-Claw'
          commit_user_email: 'ricky@lanistasoundcraft.de'
          file_pattern: 'public/data/price-radar.json public/data/history/*.json'
